<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessory Quiz</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #ffffff; --bg-secondary: #f5f5f4; --bg-tertiary: #eeede9;
      --text-primary: #1c1c1a; --text-secondary: #6b6b67; --text-tertiary: #a3a39f;
      --border-light: rgba(0,0,0,0.10); --border-mid: rgba(0,0,0,0.18); --border-strong: rgba(0,0,0,0.28);
      --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px;
      --green: #1d9e75; --green-bg: #eaf3de; --green-text: #3b6d11;
      --red-bg: #fcebeb; --red-text: #a32d2d;
      --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1c1c1a; --bg-secondary: #2a2a27; --bg-tertiary: #222220;
        --text-primary: #f0efeb; --text-secondary: #a3a39f; --text-tertiary: #6b6b67;
        --border-light: rgba(255,255,255,0.08); --border-mid: rgba(255,255,255,0.14); --border-strong: rgba(255,255,255,0.22);
        --green-bg: #173404; --green-text: #c0dd97; --red-bg: #501313; --red-text: #f09595;
      }
    }
    body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; padding: 1.5rem 1rem 3rem; }
    .app { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 500; }
    .back-btn { background: none; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 8px; cursor: pointer; color: var(--text-primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .back-btn:hover { background: var(--bg-secondary); }
    .play-btn { background: var(--text-primary); color: var(--bg-primary); border: none; border-radius: var(--radius-md); padding: 11px 26px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .play-btn:hover { opacity: 0.85; }
    .outline-btn { background: none; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 11px 22px; font-size: 15px; cursor: pointer; color: var(--text-secondary); font-family: inherit; }
    .outline-btn:hover { background: var(--bg-secondary); }

    /* Home */
    .home-card { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-xl); padding: 2.5rem 2rem; text-align: center; }
    .home-title { font-size: 26px; font-weight: 500; margin-bottom: 6px; }
    .home-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 1.75rem; }
    .home-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .no-q { margin-top: 1.25rem; font-size: 13px; color: var(--text-tertiary); }

    /* Game */
    .game-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
    .game-header h1 { flex: 1; }
    .score-badge { background: var(--bg-secondary); border: 0.5px solid var(--border-light); border-radius: var(--radius-md); padding: 4px 12px; font-size: 13px; color: var(--text-secondary); }
    .progress-bar { height: 4px; background: var(--border-light); border-radius: 2px; margin-bottom: 1.25rem; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.35s ease; }
    .question-card { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); padding: 1.5rem; text-align: center; margin-bottom: 1rem; }
    .q-num { font-size: 12px; color: var(--text-tertiary); margin-bottom: 10px; }
    .q-image { width: 180px; height: 180px; object-fit: contain; margin: 0 auto 1.25rem; display: block; border-radius: var(--radius-md); background: var(--bg-secondary); }
    .hint-toggle { background: none; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 6px 13px; font-size: 13px; cursor: pointer; color: var(--text-secondary); font-family: inherit; margin-top: 4px; }
    .hint-toggle:hover { background: var(--bg-secondary); }
    .hint-box { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 10px 14px; font-size: 13px; color: var(--text-secondary); margin-top: 10px; text-align: left; line-height: 1.5; }
    .answer-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .answer-input { flex: 1; font-size: 15px; padding: 10px 12px; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); font-family: inherit; outline: none; transition: border-color 0.15s; }
    .answer-input:focus { border-color: var(--border-strong); }
    .answer-input:disabled { opacity: 0.6; }
    .guess-btn { background: var(--text-primary); color: var(--bg-primary); border: none; border-radius: var(--radius-md); padding: 10px 18px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .guess-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .feedback { border-radius: var(--radius-md); padding: 10px 14px; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
    .feedback.correct { background: var(--green-bg); color: var(--green-text); }
    .feedback.wrong { background: var(--red-bg); color: var(--red-text); }
    .next-btn { background: none; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 9px 18px; font-size: 14px; cursor: pointer; color: var(--text-primary); font-family: inherit; }
    .next-btn:hover { background: var(--bg-secondary); }
    .finish-card { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-xl); padding: 2.5rem 2rem; text-align: center; }
    .finish-score { font-size: 42px; font-weight: 500; margin-bottom: 6px; }
    .finish-label { font-size: 14px; color: var(--text-secondary); margin-bottom: 1.75rem; }
  </style>
</head>
<body>
<div class="app">

  <!-- HOME -->
  <div id="view-home">
    <div class="home-card">
      <div class="home-title">Accessory Quiz</div>
      <div class="home-sub">Guess the character from their accessory</div>
      <div class="home-btns">
        <button class="play-btn" onclick="startGame()">Play</button>
      </div>
      <div class="no-q" id="no-q-notice" style="display:none">No questions available yet — check back soon!</div>
    </div>
  </div>

  <!-- GAME -->
  <div id="view-game" style="display:none">
    <div class="game-header">
      <button class="back-btn" onclick="showHome()"><i class="ti ti-arrow-left" aria-hidden="true" style="font-size:16px"></i></button>
      <h1>Accessory Quiz</h1>
      <div class="score-badge" id="score-badge">0 / 0</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div id="game-body"></div>
  </div>

</div>
<script>
  let questions = JSON.parse(localStorage.getItem('quiz-questions') || '[]');
  let gameQueue = [], gameIdx = 0, gameScore = 0, answered = false, hintVisible = false;

  function showHome() {
    document.getElementById('view-home').style.display = '';
    document.getElementById('view-game').style.display = 'none';
    const active = questions.filter(q => q.is_active);
    document.getElementById('no-q-notice').style.display = active.length === 0 ? '' : 'none';
  }

  function startGame() {
    // Refresh questions in case admin updated them in another tab
    questions = JSON.parse(localStorage.getItem('quiz-questions') || '[]');
    const active = questions.filter(q => q.is_active);
    if (active.length === 0) { document.getElementById('no-q-notice').style.display = ''; return; }
    gameQueue = [...active].sort(() => Math.random() - 0.5);
    gameIdx = 0; gameScore = 0;
    document.getElementById('view-home').style.display = 'none';
    document.getElementById('view-game').style.display = '';
    renderQuestion();
  }

  function renderQuestion() {
    const total = gameQueue.length;
    document.getElementById('score-badge').textContent = gameScore + ' / ' + total;
    document.getElementById('progress-fill').style.width = (gameIdx / total * 100) + '%';
    const body = document.getElementById('game-body');
    if (gameIdx >= total) {
      const pct = Math.round(gameScore / total * 100);
      body.innerHTML = `<div class="finish-card">
        <div class="finish-score">${gameScore}<span style="font-size:22px;color:var(--text-tertiary)"> / ${total}</span></div>
        <div class="finish-label">${gameScore === total ? '🎉 Perfect score!' : pct >= 70 ? 'Nice work!' : 'Keep practicing!'}</div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <button class="play-btn" onclick="startGame()">Play Again</button>
          <button class="outline-btn" onclick="showHome()">Home</button>
        </div>
      </div>`;
      return;
    }
    const q = gameQueue[gameIdx];
    answered = false; hintVisible = false;
    body.innerHTML = `<div class="question-card">
      <div class="q-num">Question ${gameIdx + 1} of ${total}</div>
      <img class="q-image" src="${esc(q.image_url)}" alt="Accessory image">
      <button class="hint-toggle" id="hint-btn" onclick="toggleHint()">Show hint</button>
      <div class="hint-box" id="hint-box" style="display:none">${esc(q.hint)}</div>
    </div>
    <div class="answer-row">
      <input class="answer-input" id="answer-in" type="text" placeholder="Character name…"
        onkeydown="if(event.key==='Enter')submitAnswer()" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="guess-btn" id="guess-btn" onclick="submitAnswer()">Guess</button>
    </div>
    <div id="feedback"></div>`;
    setTimeout(() => { const i = document.getElementById('answer-in'); if(i) i.focus(); }, 60);
  }

  function toggleHint() {
    hintVisible = !hintVisible;
    document.getElementById('hint-box').style.display = hintVisible ? '' : 'none';
    document.getElementById('hint-btn').textContent = hintVisible ? 'Hide hint' : 'Show hint';
  }

  function submitAnswer() {
    if (answered) return;
    const inp = document.getElementById('answer-in');
    const val = inp ? inp.value.trim() : '';
    if (!val) return;
    const q = gameQueue[gameIdx];
    const correct = val.toLowerCase() === q.correct_answer.toLowerCase();
    if (correct) gameScore++;
    answered = true;
    document.getElementById('score-badge').textContent = gameScore + ' / ' + gameQueue.length;
    if (inp) inp.disabled = true;
    const gb = document.getElementById('guess-btn'); if (gb) gb.disabled = true;
    const fb = document.getElementById('feedback');
    if (fb) fb.innerHTML = `<div class="feedback ${correct ? 'correct' : 'wrong'}">${correct ? '✓ Correct!' : '✗ The answer was <strong>' + esc(q.correct_answer) + '</strong>'}</div>
      <button class="next-btn" onclick="nextQuestion()">${gameIdx + 1 < gameQueue.length ? 'Next →' : 'See Results'}</button>`;
  }

  function nextQuestion() { gameIdx++; renderQuestion(); }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  showHome();
</script>
</body>
</html>
